<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: hidden;
            font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at 50% 0%, rgba(255, 236, 249, 0.55), transparent 32%),
                radial-gradient(circle at 15% 25%, rgba(255, 122, 162, 0.36), transparent 28%),
                radial-gradient(circle at 82% 72%, rgba(139, 92, 246, 0.42), transparent 32%),
                linear-gradient(135deg, #ff9dc0 0%, #7c4dff 48%, #1f103f 100%);
        }

        body.letter-open {
            overflow-y: hidden;
        }

        .glass {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .scene {
            min-height: 100vh;
            perspective: 1400px;
        }

        body.letter-open .scene {
            align-items: center;
            min-height: 100vh;
            padding-top: 0;
            padding-bottom: 0;
        }

        .stage {
            position: relative;
            width: min(92vw, 980px);
            min-height: 620px;
            transform-style: preserve-3d;
            transition: transform 0.18s ease;
        }

        .stage.open {
            min-height: 820px;
            transform: translateY(-78px);
            background: transparent !important;
            border-color: transparent !important;
            box-shadow: none !important;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .envelope-wrap {
            position: absolute;
            left: 50%;
            bottom: 92px;
            width: min(86vw, 560px);
            height: 450px;
            transform: translateX(-50%) rotateX(8deg);
            transform-style: preserve-3d;
            filter: drop-shadow(0 34px 36px rgba(24, 8, 52, 0.42));
            cursor: pointer;
            transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1), filter 0.8s ease;
        }

        .envelope-body {
            position: absolute;
            inset: auto 0 0;
            height: 350px;
            border-radius: 0 0 26px 26px;
            background: linear-gradient(145deg, #ff78aa, #a56dff 62%, #6540c8);
            border: 1px solid rgba(255, 255, 255, 0.32);
        }

        .envelope-body::before,
        .envelope-body::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 60%;
            height: 100%;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.03));
            z-index: 4;
        }

        .envelope-body::before {
            left: 0;
            clip-path: polygon(0 0, 100% 100%, 0 100%);
        }

        .envelope-body::after {
            right: 0;
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
        }

        .envelope-pocket {
            position: absolute;
            inset: auto 0 0;
            height: 250px;
            z-index: 6;
            border-radius: 0 0 26px 26px;
            background: linear-gradient(180deg, rgba(255, 244, 230, 0.08), rgba(72, 34, 139, 0.34));
            clip-path: polygon(0 0, 50% 56%, 100% 0, 100% 100%, 0 100%);
        }

        .flap {
            position: absolute;
            left: 0;
            right: 0;
            top: 100px;
            height: 176px;
            z-index: 12;
            transform-origin: top center;
            transform-style: preserve-3d;
            background: linear-gradient(160deg, #ffb1d0, #ff6fa5 48%, #8b5cf6);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.6s ease;
            filter: brightness(1.02);
        }

        .seal {
            position: absolute;
            left: 50%;
            top: 212px;
            z-index: 18;
            width: 76px;
            height: 76px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 25%, #fff4e6, #ff7aa2 52%, #b91c5c);
            box-shadow: 0 12px 26px rgba(80, 10, 50, 0.35), inset 0 0 0 2px rgba(255, 255, 255, 0.38);
            transition: opacity 0.45s ease, transform 0.65s ease;
        }

        .seal span {
            font-size: 34px;
            line-height: 1;
        }

        .letter {
            position: absolute;
            left: 50%;
            bottom: 128px;
            z-index: 20;
            width: min(78vw, 500px);
            height: min(480px, calc(100vh - 220px));
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
            padding: 34px;
            border-radius: 24px;
            color: #3c164f;
            background:
                linear-gradient(90deg, rgba(255, 122, 162, 0.08) 1px, transparent 1px),
                linear-gradient(#fffdf8, #ffeef7);
            background-size: 30px 100%, 100% 100%;
            box-shadow: 0 28px 60px rgba(34, 13, 65, 0.35);
            opacity: 0;
            transform: translate3d(-50%, 112px, -80px) rotateX(18deg) scale(0.76);
            transform-origin: bottom center;
            transition:
                opacity 0.45s ease,
                transform 1.25s cubic-bezier(0.16, 1, 0.3, 1),
                z-index 0s linear 0.55s;
        }

        .letter::before {
            content: "";
            position: absolute;
            inset: 16px;
            border: 1px dashed rgba(255, 122, 162, 0.35);
            border-radius: 18px;
            pointer-events: none;
        }

        .letter::-webkit-scrollbar {
            display: none;
        }

        .letter-title {
            font-size: clamp(1.7rem, 4vw, 2.8rem);
            font-weight: 900;
            color: #9d174d;
            text-align: center;
        }

        .letter-text {
            min-height: 0;
            margin-top: 22px;
            white-space: pre-wrap;
            font-size: clamp(1rem, 2.2vw, 1.18rem);
            line-height: 1.85;
            font-weight: 700;
        }

        .letter-cursor::after {
            content: "";
            display: inline-block;
            width: 3px;
            height: 1.15em;
            margin-left: 4px;
            vertical-align: -0.18em;
            background: #9d174d;
            animation: blink 0.8s steps(1) infinite;
        }

        .open-hint {
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            color: #fff4e6;
            text-align: center;
            transition: opacity 0.45s ease;
        }

        .stage.open .flap {
            transform: rotateX(178deg);
            filter: brightness(1.18);
        }

        .stage.open .envelope-wrap {
            transform: translateX(-50%) translateY(-30px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.94);
            filter: drop-shadow(0 42px 42px rgba(24, 8, 52, 0.5));
        }

        .stage.open .seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.2) rotate(50deg);
        }

        .stage.letter-visible .letter {
            z-index: 20;
            opacity: 1;
            transform: translate3d(-50%, -36px, 170px) rotateX(0deg) rotateY(0deg) scale(1);
            animation: letter3dReveal 1.15s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .stage.open .open-hint {
            display: none;
        }

        .sparkle {
            position: absolute;
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--spark-color);
            pointer-events: none;
            filter: drop-shadow(0 0 10px var(--spark-color));
            animation: sparkleFly 1.5s ease-out forwards;
        }

        .heart-float {
            position: fixed;
            left: var(--x);
            bottom: -40px;
            font-size: var(--size);
            opacity: 0.72;
            pointer-events: none;
            animation: heartRise var(--duration) linear forwards;
        }

        .mail-shine {
            position: absolute;
            inset: -80px;
            z-index: 2;
            opacity: 0.4;
            pointer-events: none;
            background: linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.38), transparent 55%);
            transform: translateX(-65%);
            animation: shineSweep 5s ease-in-out infinite;
            transition: opacity 0.6s ease;
        }

        .stage.open .mail-shine {
            display: none;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        @keyframes sparkleFly {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2);
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1);
            }
        }

        @keyframes heartRise {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            15% {
                opacity: 0.75;
            }

            100% {
                transform: translateY(-115vh) rotate(var(--rot));
                opacity: 0;
            }
        }

        @keyframes shineSweep {
            0%, 45% {
                transform: translateX(-65%);
            }

            70%, 100% {
                transform: translateX(65%);
            }
        }

        @keyframes letter3dReveal {
            0% {
                transform: translate3d(-50%, 96px, -90px) rotateX(34deg) rotateY(-9deg) scale(0.72);
                filter: drop-shadow(0 0 0 rgba(255, 244, 230, 0));
            }

            55% {
                transform: translate3d(-50%, -58px, 210px) rotateX(-4deg) rotateY(3deg) scale(1.04);
                filter: drop-shadow(0 0 32px rgba(255, 244, 230, 0.68));
            }

            100% {
                transform: translate3d(-50%, -36px, 170px) rotateX(0deg) rotateY(0deg) scale(1);
                filter: drop-shadow(0 18px 26px rgba(54, 18, 82, 0.28));
            }
        }

        @keyframes letter3dRevealMobile {
            0% {
                transform: translate3d(-50%, 76px, -70px) rotateX(30deg) rotateY(-7deg) scale(0.72);
            }

            55% {
                transform: translate3d(-50%, -18px, 170px) rotateX(-3deg) rotateY(2deg) scale(1.03);
            }

            100% {
                transform: translate3d(-50%, -24px, 150px) rotateX(0deg) rotateY(0deg) scale(1);
            }
        }

        @media (max-width: 720px) {
            .stage {
                min-height: 610px;
            }

            .envelope-wrap {
                bottom: 90px;
                height: 310px;
            }

            .envelope-body,
            .envelope-pocket {
                height: 210px;
            }

            .flap {
                top: 100px;
                height: 150px;
            }

            .seal {
                top: 198px;
            }

            .stage.letter-visible .letter {
                transform: translate3d(-50%, -24px, 150px) rotateX(0deg) scale(1);
                animation-name: letter3dRevealMobile;
            }
        }
    </style>
</head>

<body>
    <main class="scene flex min-h-screen items-center justify-center px-4 py-2">
        <section id="stage"
            class="stage glass rounded-[56px] border border-white bg-white/10 shadow-2xl">
            <div class="mail-shine"></div>

            <!-- Next Page Button (Top Right Inside Container) -->
            <div class="absolute top-10 right-6 z-50">
                <button id="nextPageBtn" class="pointer-events-none opacity-0 scale-95 translate-y-2 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-bold py-2.5 px-6 rounded-full shadow-lg border border-white/30 transform transition-all duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)] hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    Next Page
                </button>
            </div>

            <div id="envelope" class="envelope-wrap" role="button" tabindex="0" aria-label="Open the birthday letter">
                <div class="letter">
                    <h1 class="letter-title">A Letter For You</h1>
                    <p id="letterText" class="letter-text letter-cursor"></p>
                </div>
                <div class="flap"></div>
                <div class="envelope-body"></div>
                <div class="envelope-pocket"></div>
                <div class="seal"><span>🎀</span></div>
            </div>

            <div class="open-hint">
                <p class="text-xl pb-2 font-bold uppercase tracking-[0.35em] text-pink-100">Tap The Envelope</p>
            </div>
        </section>
    </main>

    <script>
        const stage = document.getElementById('stage');
        const envelope = document.getElementById('envelope');
        const letter = document.querySelector('.letter');
        const letterText = document.getElementById('letterText');
        const nextBtn = document.getElementById('nextPageBtn');
        const message = `My dearest,\nSome people make the world softer just by being in it. You are one of those rare hearts.\nYou are kind in ways that stay with people. I hope this birthday reminds you how deeply you are loved, how much joy you bring, and how special your smile is to me.May this year hold gentle surprises, bright little miracles, every happiness your heart has quietly wished for.`;
        const sparkColors = ['#fff4e6', '#ff7aa2', '#ffd166', '#c4b5fd', '#ffffff'];
        let opened = false;

        // Next page routing logic
        nextBtn.addEventListener('click', () => {
            window.location.href = 'index1.html'; // Change to your next page URL
        });

        function typeWriter(text, target, speed = 32) {
            target.textContent = '';
            let index = 0;
            const interval = setInterval(() => {
                target.textContent += text.charAt(index);
                if (letter) {
                    letter.scrollTop = letter.scrollHeight;
                }
                index += 1;
                if (index >= text.length) {
                    clearInterval(interval);
                    target.classList.remove('letter-cursor');
                    if (letter) {
                        letter.scrollTop = letter.scrollHeight;
                    }
                    // Letter is completely finished typing! Reveal the button
                    revealNextButton();
                }
            }, speed);
        }

        function revealNextButton() {
            nextBtn.classList.remove('pointer-events-none', 'opacity-0', 'scale-95', 'translate-y-2');
            nextBtn.classList.add('opacity-100', 'scale-100', 'translate-y-0');
        }

        function sparkleBurst(count = 52) {
            const rect = stage.getBoundingClientRect();
            for (let i = 0; i < count; i += 1) {
                const spark = document.createElement('span');
                const angle = Math.random() * Math.PI * 2;
                const distance = 90 + Math.random() * 230;
                spark.className = 'sparkle';
                spark.style.left = `${rect.width / 2}px`;
                spark.style.top = `${rect.height * 0.55}px`;
                spark.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                spark.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                spark.style.setProperty('--spark-color', sparkColors[Math.floor(Math.random() * sparkColors.length)]);
                stage.appendChild(spark);
                setTimeout(() => spark.remove(), 1600);
            }
        }

        function spawnHeart() {
            const heart = document.createElement('span');
            heart.className = 'heart-float';
            heart.textContent = Math.random() > 0.5 ? '🧸' : '🎁';
            heart.style.setProperty('--x', `${Math.random() * 100}vw`);
            heart.style.setProperty('--size', `${18 + Math.random() * 22}px`);
            heart.style.setProperty('--duration', `${6 + Math.random() * 5}s`);
            heart.style.setProperty('--rot', `${Math.random() * 120 - 60}deg`);
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 11000);
        }

        function openLetter() {
            if (opened) return;
            opened = true;
            document.body.classList.add('letter-open');
            stage.classList.remove('glass');
            stage.classList.add('open');
            sparkleBurst();
            setTimeout(() => {
                stage.classList.add('letter-visible');
            }, 1500);
            setTimeout(() => typeWriter(message, letterText, 30), 2300);
        }

        envelope.addEventListener('click', openLetter);
        envelope.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                openLetter();
            }
        });

        stage.addEventListener('mousemove', (event) => {
            if (opened) return;
            const rect = stage.getBoundingClientRect();
            const x = (event.clientX - rect.left) / rect.width - 0.5;
            const y = (event.clientY - rect.top) / rect.height - 0.5;
            stage.style.transform = `rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
        });

        stage.addEventListener('mouseleave', () => {
            stage.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });

        setInterval(spawnHeart, 700);
    </script>
</body>

</html>
